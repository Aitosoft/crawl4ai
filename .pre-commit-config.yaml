# Aitosoft pre-commit config.
#
# CRITICAL RULE: hooks run ONLY on Aitosoft-owned files. Upstream files must
# stay byte-identical to unclecode/crawl4ai or every future merge drowns in
# formatter noise (the 2026-04 "normalize whitespace" commit reformatted ~90
# upstream files and turned our real ~10-file delta into an 11.5k-line
# phantom diff). The top-level `files:` pattern below is the enforcement —
# extend it when adding new Aitosoft files outside these paths, never by
# widening it to upstream code.
files: >
  (?x)^(
    deploy/docker/aitosoft_.*\.py|
    test-aitosoft/.*|
    tasks/.*|
    azure-deployment/.*|
    \.devcontainer/.*|
    \.pre-commit-config\.yaml|
    \.github/workflows/monitor-crawl4ai-releases\.yml|
    \.env\.example|
    CLAUDE\.md|
    AITOSOFT_.*\.md|
    DEPLOYMENT_INFO\.md|
    TESTING\.md|
    TEST_SITES_REGISTRY\.md|
    OVERNIGHT_PLAYBOOK\.md
  )$

# Captured artifacts (fingerprint HTML dumps, crawl results, reports) are
# historical records — never rewrite them.
exclude: ^test-aitosoft/(stealth-[^/]+|artifacts|results|reports|archive)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml

  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.287
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        additional_dependencies: [types-requests]
        args: [--ignore-missing-imports]
