repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^\.github/workflows/.*\.yml$  # GitHub Actions YAML has special syntax
      - id: check-added-large-files
      - id: check-json
      - id: check-toml

  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=88]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.287
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Aitosoft: upstream files have pre-existing lint issues (bare
        # excepts, long lines, multi-import lines) that predate our work.
        # Fixing them is out of scope for this fork.
        exclude: ^(crawl4ai/|deploy/docker/(api|server|crawler_pool)\.py$)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        additional_dependencies: [types-requests]
        args: [--ignore-missing-imports]
        # Aitosoft: exclude upstream files with pre-existing type issues.
        # Our edits to these files are minimal and targeted (stealth fixes);
        # fixing the latent upstream type errors is out of scope for this
        # fork. Re-enable once upstream cleans them up.
        exclude: ^(crawl4ai/|deploy/docker/(api|server|crawler_pool)\.py$)
