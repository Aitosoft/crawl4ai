# Application Configuration
app:
  title: "Crawl4AI API"
  version: "1.0.0"
  # Loopback by default. Exposing on 0.0.0.0 requires a credential
  # (CRAWL4AI_API_TOKEN); the startup auth guard refuses an open non-loopback
  # bind without one. Put a TLS-terminating reverse proxy in front for exposure.
  host: "127.0.0.1"
  port: 11235
  reload: False
  workers: 1
  timeout_keep_alive: 300

# Default LLM Configuration
llm:
  provider: "openai/gpt-4o-mini"
  # api_key: sk-...  # If you pass the API key directly (not recommended)

# Redis Configuration
# Set task_ttl_seconds to automatically expire task data in Redis.
# This prevents unbounded memory growth from accumulated task results.
# Default: 3600 (1 hour). Set to 0 to disable TTL (not recommended).
# Can be overridden with REDIS_TASK_TTL environment variable.
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  task_ttl_seconds: 3600  # TTL for task data (1 hour default)
  ssl: False
  ssl_cert_reqs: None
  ssl_ca_certs: None
  ssl_certfile: None
  ssl_keyfile: None

# Resource governance (DoS protection). Any limit set to 0 means "unbounded"
# (the pre-hardening behavior), so you can relax or disable each one.
limits:
  max_body_bytes: 10485760  # 10 MiB request body cap (413 if exceeded); 0 = unbounded
  max_pages: 100            # deep-crawl page budget clamp (defense in depth)
  max_depth: 5              # deep-crawl depth clamp
  # Aitosoft: 180s hard deadline per crawl (arun + patchright retry). Azure
  # Container Apps ingress times out at 240s; if the backend keeps running
  # past that, the pool slot leaks (2026-04-14 incident). 180s leaves ~60s
  # of margin for cleanup + serialization. Replaces our old api.py wait_for
  # patch — upstream v0.9.0 added this mechanism natively.
  wall_clock_s: 180         # per-crawl deadline in seconds (504 on timeout); 0 = no deadline
  queue:                    # background job queue for /crawl/job and /llm/job
    maxsize: 1000           # max queued jobs (503 when full); 0 = unbounded
    workers: 4              # concurrent background workers
    per_principal: 0        # max concurrent jobs per caller (429 over cap); 0 = unlimited

# Rate Limiting Configuration
rate_limiting:
  enabled: True
  default_limit: "1000/minute"
  trusted_proxies: []
  storage_uri: "memory://"  # Use "redis://localhost:6379" for production

# Security Configuration
# WARNING: For production deployments, enable security and use proper SECRET_KEY:
#   - Set jwt_enabled: true for authentication
#   - Set SECRET_KEY environment variable to a secure random value
#   - Set CRAWL4AI_HOOKS_ENABLED=true only if you need hooks (RCE risk)
security:
  enabled: true
  jwt_enabled: false
  api_token: ""  # When set, /token endpoint requires this secret to issue JWTs
  https_redirect: false
  trusted_hosts: ["*"]
  cors_allow_origins: []  # deny-by-default; list explicit origins to allow CORS
  headers:
    x_content_type_options: "nosniff"
    x_frame_options: "DENY"
    content_security_policy: "default-src 'self'"
    strict_transport_security: "max-age=63072000; includeSubDomains"

# Crawler Configuration
crawler:
  base_config:
    simulate_user: true
  memory_threshold_percent: 85.0  # Aitosoft: was 95 — leave headroom on 4 GiB replicas
  rate_limiter:
    enabled: true
    base_delay: [1.0, 2.0]
  timeouts:
    stream_init: 30.0  # Timeout for stream initialization
    batch_process: 300.0  # Timeout for batch processing
  pool:
    max_pages: 5                           # Aitosoft: keep low; scale horizontally via replicas (2026-04-14 starvation incident)
    idle_ttl_sec: 300                     # 30 min janitor cutoff
    stuck_busy_timeout_sec: 600           # Aitosoft: janitor force-closes browsers busy longer than this (leak safety net)
    # Aitosoft render admission (2026-07-17, kynnos.fi 504 incident). Hard cap
    # on concurrent /crawl full renders per replica; overflow queues briefly,
    # then 429s so the client retries against a scaled-out replica instead of
    # contending into the 180s wall-clock fence. MUST match the ACA scale rule
    # (--scale-rule-http-concurrency == render_capacity). See
    # aitosoft_admission.py + tasks/capacity-scaling-redesign.md.
    render_capacity: 2                    # concurrent renders admitted per replica
    admission_queue: 4                    # max waiters; more than this -> instant 429
    admission_max_wait_s: 15              # max queue wait before 429 (fence starts AFTER dequeue)
  browser:
    # Aitosoft stealth defaults (2026-04-11 stealth package). Applied to every
    # request via BrowserConfig.set_defaults() in aitosoft_entry.py.
    kwargs:
      headless: true
      text_mode: false                     # Load images/fonts — blocking them is a clean fingerprint signal
      enable_stealth: true                 # playwright-stealth: patches navigator.webdriver, chrome.runtime, WebGL vendor, plugins
      chrome_channel: chrome               # Real Google Chrome (installed in Dockerfile); browser_manager reads chrome_channel at launch
      channel: chrome                      # Kept for symmetry — BrowserConfig stores both
      viewport_width: 1920                 # Realistic desktop (default 1080 is unusually narrow)
      viewport_height: 1080                # Realistic desktop (default 600 is unusually short)
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36"  # Windows to match playwright-stealth's navigator.platform=Win32 override; version tracks current stable Chrome — bump on rebuild
    extra_args:
      # - "--single-process"
      # SECURITY: --no-sandbox disables the Chromium renderer sandbox (a renderer
      # exploit can then reach the container). It is required only because the
      # container runs as non-root without a usable sandbox. To remove it, run
      # the container with an unprivileged user namespace
      # (host: unprivileged_userns_clone=1) OR a verified seccomp profile
      # (compose: security_opt: seccomp=...), then delete this flag and confirm
      # Chromium still starts. Tracked as a build-gated hardening item.
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      # Aitosoft: NO --disable-gpu / --disable-software-rasterizer here — they
      # kill WebGL, one of the loudest anti-bot signals (stealth package).
      # browser_manager gates them on enable_stealth.
      # --disable-web-security removed for security (enables cross-origin access)
      # --ignore-certificate-errors not needed: BrowserConfig.ignore_https_errors
      # defaults to true at the Playwright context level, which covers the
      # broken-cert Finnish SME sites without advertising a bot flag.

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Observability Configuration
observability:
  prometheus:
    enabled: True
    endpoint: "/metrics"
  health_check:
    endpoint: "/health"

# Webhook Configuration
webhooks:
  enabled: true
  default_url: null  # Optional: default webhook URL for all jobs
  data_in_payload: false  # Optional: default behavior for including data
  retry:
    max_attempts: 5
    initial_delay_ms: 1000  # 1s, 2s, 4s, 8s, 16s exponential backoff
    max_delay_ms: 32000
    timeout_ms: 30000  # 30s timeout per webhook call
  headers:  # Optional: default headers to include
    User-Agent: "Crawl4AI-Webhook/1.0"